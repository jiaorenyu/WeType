<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公众号排版工具</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Toolbar ===== */
    #toolbar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    #toolbar .logo {
      font-size: 18px;
      font-weight: 700;
      color: #07c160;
      margin-right: 8px;
      white-space: nowrap;
    }
    #toolbar label { font-size: 13px; color: #555; white-space: nowrap; }
    #toolbar select, #toolbar input[type=color], #toolbar input[type=range], #toolbar input[type=number] {
      font-size: 13px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 3px 6px;
      background: #fafafa;
      cursor: pointer;
    }
    #toolbar input[type=color] { width: 36px; height: 28px; padding: 1px 2px; }
    #toolbar input[type=range] { width: 80px; padding: 0; cursor: pointer; }
    #toolbar input[type=number] { width: 56px; }
    #toolbar .sep { width: 1px; height: 22px; background: #e0e0e0; margin: 0 4px; }
    #toolbar button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .15s;
    }
    #toolbar button:hover { opacity: .85; }
    #btn-copy { background: #07c160; color: #fff; }
    #btn-clear { background: #eee; color: #555; }
    #copy-tip {
      font-size: 12px;
      color: #07c160;
      display: none;
    }

    /* ===== Main layout ===== */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ===== Editor pane ===== */
    #editor-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #e0e0e0;
      background: #fff;
    }
    #editor-pane .pane-title {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      background: #f7f8fa;
      border-bottom: 1px solid #eee;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: "SFMono-Regular", "Consolas", "Liberation Mono", Menlo, monospace;
      font-size: 14px;
      line-height: 1.7;
      color: #333;
      background: #fff;
      overflow-y: auto;
    }

    /* ===== Preview pane ===== */
    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f0f2f5;
      overflow: hidden;
    }
    #preview-pane .pane-title {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      background: #f7f8fa;
      border-bottom: 1px solid #eee;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    #preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    /* WeChat article phone mock */
    #preview-wrapper {
      background: #fff;
      width: 375px;
      min-height: 500px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #preview-header {
      background: #f5f5f5;
      padding: 12px 16px 8px;
      border-bottom: 1px solid #eee;
    }
    #preview-header .ph-title {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    #preview-header .ph-meta {
      font-size: 12px;
      color: #999;
    }
    #preview-content {
      padding: 16px;
      font-size: 15px;
      line-height: 1.75;
      color: #333;
      word-break: break-all;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>

<!-- ===== Toolbar ===== -->
<div id="toolbar">
  <span class="logo">✦ 公众号排版</span>

  <div class="sep"></div>

  <label for="theme-select">主题风格</label>
  <select id="theme-select">
    <option value="default">默认清爽</option>
    <option value="tech">科技蓝</option>
    <option value="fresh">清新绿</option>
    <option value="business">商务黑</option>
    <option value="literary">文艺橙</option>
    <option value="custom">自定义</option>
  </select>

  <div class="sep"></div>

  <div id="custom-controls" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <label>主色</label>
    <input type="color" id="color-primary" value="#07c160" title="主色调" />
    <label>字号</label>
    <input type="number" id="font-size" value="15" min="12" max="22" title="正文字号(px)" />
    <span style="font-size:11px;color:#aaa">px</span>
    <label>行高</label>
    <input type="range" id="line-height" min="140" max="220" value="175" title="行高" />
    <span id="lh-display" style="font-size:12px;color:#888;min-width:28px">1.75</span>
    <label for="font-family">字体</label>
    <select id="font-family">
      <option value="system">系统默认</option>
      <option value="song">宋体</option>
      <option value="hei">黑体</option>
      <option value="kai">楷体</option>
    </select>
  </div>

  <div class="sep"></div>
  <button id="btn-copy">📋 复制到公众号</button>
  <button id="btn-clear">清空</button>
  <span id="copy-tip">✅ 已复制，去公众号粘贴吧！</span>
</div>

<!-- ===== Main ===== -->
<div id="main">
  <!-- Editor -->
  <div id="editor-pane">
    <div class="pane-title">Markdown 编辑器</div>
    <textarea id="editor" spellcheck="false" placeholder="在这里输入 Markdown 内容…"></textarea>
  </div>

  <!-- Preview -->
  <div id="preview-pane">
    <div class="pane-title">预览（模拟手机效果）</div>
    <div id="preview-scroll">
      <div id="preview-wrapper">
        <div id="preview-header">
          <div class="ph-title" id="ph-title">公众号标题</div>
          <div class="ph-meta">公众号名称 · 刚刚</div>
        </div>
        <div id="preview-content"></div>
      </div>
    </div>
  </div>
</div>

/* Font family mapping */
const FONT_MAP = {
  system: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif',
  song: 'Georgia, "Times New Roman", SimSun, "宋体", serif',
  hei: '"PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", SimHei, "黑体", sans-serif',
  kai: 'KaiTi, "楷体", STKaiti, Georgia, serif',
};

/* ================================================================
   STATE
================================================================ */
let currentTheme = { ...THEMES.default };

/* ================================================================
   INLINE-STYLE HTML GENERATOR
   Takes parsed Markdown tokens and produces WeChat-compatible HTML
   with every style attribute inlined.
================================================================ */
function getFont(t) {
  return FONT_MAP[t.fontFamily] || FONT_MAP.system;
}

function renderWechatHtml(markdown, theme) {
  /* Use marked to produce raw HTML, then post-process to inline styles */
  marked.setOptions({ breaks: true, gfm: true });
  let raw = marked.parse(markdown);

  /* We'll reconstruct with inline styles using a DOM parser */
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div id="root">' + raw + '</div>', 'text/html');
  const root = doc.getElementById('root');

  const fs = theme.fontSize + 'px';
  const lh = theme.lineHeight;
  const ff = getFont(theme);

  /* ---- apply styles to each element ---- */
  const applyAll = (sel, styleFn) => {
    root.querySelectorAll(sel).forEach((el, i) => {
      const existing = el.getAttribute('style') || '';
      el.setAttribute('style', existing + ';' + styleFn(el, i));
    });
  };

  /* paragraphs */
  applyAll('p', () =>
    `margin:0 0 16px 0;font-size:${fs};line-height:${lh};color:${theme.text};font-family:${ff};overflow-wrap:break-word;word-break:break-word;`
  );

  /* headings */
  const headingStyles = {
    H1: `font-size:${theme.fontSize + 6}px;font-weight:700;color:${theme.headingColor};border-left:4px solid ${theme.primary};padding-left:10px;margin:24px 0 14px;line-height:1.4;font-family:${ff};`,
    H2: `font-size:${theme.fontSize + 4}px;font-weight:700;color:${theme.headingColor};border-bottom:2px solid ${theme.primary};padding-bottom:6px;margin:22px 0 12px;line-height:1.4;font-family:${ff};`,
    H3: `font-size:${theme.fontSize + 2}px;font-weight:700;color:${theme.headingColor};margin:18px 0 10px;line-height:1.4;font-family:${ff};`,
    H4: `font-size:${theme.fontSize + 1}px;font-weight:700;color:${theme.headingColor};margin:16px 0 8px;line-height:1.4;font-family:${ff};`,
    H5: `font-size:${fs};font-weight:700;color:${theme.headingColor};margin:14px 0 8px;line-height:1.4;font-family:${ff};`,
    H6: `font-size:${fs};font-weight:600;color:${theme.secondaryText};margin:12px 0 6px;line-height:1.4;font-family:${ff};`,
  };
  ['h1','h2','h3','h4','h5','h6'].forEach(tag => {
    applyAll(tag, () => headingStyles[tag.toUpperCase()]);
  });

  /* blockquote */
  applyAll('blockquote', () =>
    `border-left:4px solid ${theme.blockquoteBorder};background:${theme.blockquoteBg};margin:16px 0;padding:12px 16px;border-radius:0 6px 6px 0;`
  );
  applyAll('blockquote p', () =>
    `margin:0;font-size:${fs};line-height:${lh};color:${theme.secondaryText};font-family:${ff};`
  );

  /* code blocks */
  applyAll('pre', () =>
    `background:${theme.codeBg};border-radius:8px;padding:14px 16px;margin:16px 0;overflow-x:auto;`
  );
  applyAll('pre code', () =>
    `font-size:13px;line-height:1.6;color:${theme.codeColor};font-family:SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap;`
  );

  /* inline code */
  applyAll('code:not(pre code)', () =>
    `background:${theme.codeBg};color:${theme.codeColor};padding:1px 5px;border-radius:3px;font-size:${theme.fontSize - 1}px;font-family:SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;`
  );

  /* lists */
  applyAll('ul', () =>
    `margin:0 0 16px 0;padding-left:22px;`
  );
  applyAll('ol', () =>
    `margin:0 0 16px 0;padding-left:22px;`
  );
  applyAll('li', () =>
    `font-size:${fs};line-height:${lh};color:${theme.text};margin-bottom:4px;font-family:${ff};`
  );
  applyAll('li p', () =>
    `margin:0;font-size:${fs};line-height:${lh};color:${theme.text};font-family:${ff};`
  );

  /* horizontal rule */
  applyAll('hr', () =>
    `border:none;border-top:1px solid ${theme.hrColor};margin:24px 0;`
  );

  /* strong / em */
  applyAll('strong', () =>
    `color:${theme.strongColor};font-weight:700;`
  );
  applyAll('em', () =>
    `font-style:italic;color:${theme.secondaryText};`
  );

  /* links — href is removed because WeChat public accounts do not support
     arbitrary hyperlinks in article body; keeping the visual style only */
  applyAll('a', (el) => {
    el.removeAttribute('href');
    return `color:${theme.linkColor};text-decoration:none;font-weight:600;`;
  });

  /* images */
  applyAll('img', () =>
    `max-width:100%;height:auto;display:block;margin:12px auto;border-radius:6px;`
  );

  /* tables */
  applyAll('table', () =>
    `width:100%;border-collapse:collapse;margin:16px 0;font-size:${fs};font-family:${ff};`
  );
  applyAll('th', () =>
    `background:${theme.primary};color:#fff;padding:8px 10px;text-align:left;font-size:${fs};font-weight:600;`
  );
  applyAll('td', () =>
    `padding:8px 10px;border-bottom:1px solid #eee;font-size:${fs};color:${theme.text};`
  );
  applyAll('tr:nth-child(even) td', () =>
    `background:#fafafa;`
  );

  return root.innerHTML;
}

================================================================ */
const editor    = document.getElementById('editor');
const preview   = document.getElementById('preview-content');
const phTitle   = document.getElementById('ph-title');
const themeSelect = document.getElementById('theme-select');
const colorPrimary = document.getElementById('color-primary');
const fontSizeInput = document.getElementById('font-size');
const lineHeightInput = document.getElementById('line-height');
const lhDisplay = document.getElementById('lh-display');
const fontFamilySelect = document.getElementById('font-family');
const customControls = document.getElementById('custom-controls');
const btnCopy   = document.getElementById('btn-copy');
const btnClear  = document.getElementById('btn-clear');
const copyTip   = document.getElementById('copy-tip');

function applyTheme(theme) {
  currentTheme = { ...theme };
  colorPrimary.value = theme.primary;
  fontSizeInput.value = theme.fontSize;
  lineHeightInput.value = Math.round(theme.lineHeight * 100);
  lhDisplay.textContent = theme.lineHeight.toFixed(2);
  fontFamilySelect.value = theme.fontFamily;
}

function buildCustomTheme() {
  return {
    ...THEMES.default,
    primary: colorPrimary.value,
    secondary: colorPrimary.value,
    headingColor: shadeColor(colorPrimary.value, -20),
    blockquoteBorder: colorPrimary.value,
    strongColor: colorPrimary.value,
    linkColor: colorPrimary.value,
    fontSize: parseInt(fontSizeInput.value, 10),
    lineHeight: parseInt(lineHeightInput.value, 10) / 100,
    fontFamily: fontFamilySelect.value,
  };
}

/* simple shade helper */
function shadeColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + pct));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
  const b = Math.min(255, Math.max(0, (num & 0xff) + pct));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function render() {
  const md = editor.value;
  if (!md.trim()) { preview.innerHTML = ''; phTitle.textContent = '公众号标题'; return; }

  /* extract first heading as article title */
  const titleMatch = md.match(/^#\s+(.+)$/m);
  if (titleMatch) {
    phTitle.textContent = titleMatch[1].trim();
  }

  const theme = themeSelect.value === 'custom' ? buildCustomTheme() : (THEMES[themeSelect.value] || THEMES.default);
  currentTheme = theme;
  preview.innerHTML = renderWechatHtml(md, theme);
}

/* debounce render */
let renderTimer;
editor.addEventListener('input', () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 120);
});

themeSelect.addEventListener('change', () => {
  const val = themeSelect.value;
  if (val !== 'custom') {
    applyTheme(THEMES[val] || THEMES.default);
    customControls.style.opacity = '.5';
    customControls.style.pointerEvents = 'none';
  } else {
    customControls.style.opacity = '1';
    customControls.style.pointerEvents = '';
  }
  render();
});

[colorPrimary, fontSizeInput, lineHeightInput, fontFamilySelect].forEach(el => {
  el.addEventListener('input', () => {
    if (themeSelect.value === 'custom') {
      lhDisplay.textContent = (parseInt(lineHeightInput.value, 10) / 100).toFixed(2);
      render();
    }
  });
});

btnCopy.addEventListener('click', () => {
  /* Build the full copy payload: a wrapper div with inline font styles */
  const md = editor.value;
  if (!md.trim()) { alert('内容为空，请先输入内容！'); return; }
  const theme = themeSelect.value === 'custom' ? buildCustomTheme() : (THEMES[themeSelect.value] || THEMES.default);
  const html = renderWechatHtml(md, theme);
  const ff = getFont(theme);
  const wrapper = `<div style="font-family:${ff};font-size:${theme.fontSize}px;line-height:${theme.lineHeight};color:${theme.text};overflow-wrap:break-word;word-break:break-word;padding:0 4px;">${html}</div>`;

  /* Try clipboard API with HTML mime type */
  if (navigator.clipboard && window.ClipboardItem) {
    const blob = new Blob([wrapper], { type: 'text/html' });
    navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })])
      .then(() => showCopyTip())
      .catch(() => fallbackCopy(wrapper));
  } else {
    fallbackCopy(wrapper);
  }
});

function fallbackCopy(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(div);
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    showCopyTip();
  } catch (e) {
    alert('复制失败，请手动选择预览内容并复制。');
  } finally {
    sel.removeAllRanges();
    document.body.removeChild(div);
  }
}

function showCopyTip() {
  copyTip.style.display = 'inline';
  setTimeout(() => { copyTip.style.display = 'none'; }, 3000);
}

btnClear.addEventListener('click', () => {
  if (editor.value && confirm('确定清空所有内容吗？')) {
    editor.value = '';
    render();
  }
});

/* disable custom controls by default */
customControls.style.opacity = '.5';
customControls.style.pointerEvents = 'none';
