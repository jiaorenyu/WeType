<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5F7A"/>
      <stop offset="100%" stop-color="#2d8fba"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="315" r="300" fill="rgba(255,255,255,0.02)"/>
  <!-- 分隔线 -->
  <rect x="400" y="370" width="400" height="2" fill="url(#accent)"/>
  <!-- 品牌名 -->
  <text x="600" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">WriteNow</text>
  <!-- 副标题 -->
  <text x="600" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">极简 Markdown 转公众号排版工具</text>
  <!-- 标签 -->
  <rect x="480" y="400" width="240" height="36" rx="18" fill="rgba(255,255,255,0.12)"/>
  <text x="600" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle" dominant-baseline="middle">免登录 · 开源 · 免费</text>
</svg>
